[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisor/supervisord.pid
childlogdir=/var/log/supervisor

[program:comfyui]
# GPU 0: this container is allocated a single GPU (compose device_ids: ['0']),
# so device 1 does not exist inside it — pinning to 1 crashed ComfyUI on startup
# with "No CUDA GPUs are available" (torch.cuda.device_count()==1).
command=/usr/bin/python3.12 /opt/comfyui/main.py --listen 0.0.0.0 --port 8188 --cuda-device 0 --preview-method auto
directory=/opt/comfyui
environment=DISPLAY=":1",CUDA_VISIBLE_DEVICES="0"
autorestart=true
priority=40
startretries=5
startsecs=10
stdout_logfile=/var/log/supervisor/comfyui.log
stderr_logfile=/var/log/supervisor/comfyui-err.log

[program:web-interface]
command=/usr/bin/python3.12 /opt/web-interface/app.py
directory=/opt/web-interface
user=ubuntu
environment=HOME="/home/ubuntu",TERM="xterm-256color"
autorestart=true
priority=50
stdout_logfile=/var/log/supervisor/web-interface.log
stderr_logfile=/var/log/supervisor/web-interface-err.log

[program:terminal]
command=/usr/local/bin/ttyd --port 7681 --writable --uid 1000 --gid 1000 bash --login
directory=/opt/gaussian-toolkit
user=ubuntu
autorestart=true
priority=60
startretries=3
startsecs=2
stdout_logfile=/var/log/supervisor/terminal.log
stderr_logfile=/var/log/supervisor/terminal-err.log
