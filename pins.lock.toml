# pins.lock.toml — reproducible version lock for the Vitrine pipeline
# ============================================================================
# Work-order item 7 (ADR-012 T6 / FR-25): every component is cloned at a
# floating HEAD today. This manifest enumerates them. `resolved_commit` is
# DELIBERATELY EMPTY for every git component — it is filled ON THE GPU HOST
# (.48) by scripts/resolve_pins.sh, which read-only `git rev-parse HEAD`s the
# real checked-out repos. NO commit SHA is fabricated here. Until the resolver
# runs on .48, this lock is UNRESOLVED by design.
#
# After resolution, the build layer should pin each clone to the recorded
# `resolved_commit` (git checkout <sha>) / `version` (pip ==<ver>) instead of
# cloning HEAD. See the per-component `clone_site` for where to apply the pin.
# ============================================================================

schema_version = "1.0"

# --- Core engine / toolkit -------------------------------------------------

[[component]]
name = "gaussian-toolkit"
repo = "https://github.com/jjohare/gaussian-toolkit"
kind = "git"
ref = "HEAD"                # cloned HEAD then `git checkout gaussian-toolkit` (branch)
resolved_commit = ""        # filled by resolve_pins.sh on .48 — DO NOT fabricate
host_path = "/opt/gaussian-toolkit"
clone_site = "Dockerfile.consolidated:125"
note = "Fork host. Cloned --recursive, then checks out branch 'gaussian-toolkit'. Pin the branch tip commit + submodule SHAs."

# --- Reconstruction / SfM --------------------------------------------------

[[component]]
name = "colmap"
repo = "https://github.com/colmap/colmap"
kind = "git"
ref = "HEAD"                # cloned --depth 1 (shallow) — HEAD of default branch
resolved_commit = ""        # filled by resolve_pins.sh on .48 — DO NOT fabricate
host_path = "/tmp/colmap"
clone_site = "Dockerfile.consolidated:104"
note = "Built from source for sm_89 (Ada). --depth 1 means /tmp/colmap is deleted post-build (rm -rf line 114); resolve on .48 only if a checkout survives, else pin to a release tag (e.g. 3.x) by hand. ADR-012 T2 wants COLMAP 4.1 ALIKED+LightGlue path."

